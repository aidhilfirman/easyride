<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EasyRide Support Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
    }
  }
}
</script>
<style>
body { font-family: 'Inter', system-ui, sans-serif; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.animate-fadeIn { animation: fadeIn 0.4s ease-out both; }
.animate-slideIn { animation: slideIn 0.3s ease-out both; }
.animate-slideUp { animation: slideUp 0.35s ease-out both; }
.animate-toastIn { animation: toastIn 0.3s ease-out both; }
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
/* Page transitions (GPU-accelerated) */
@keyframes pageExitLeft { to { opacity: 0; transform: translateX(-50px) scale(0.97); } }
@keyframes pageEnterRight { from { opacity: 0; transform: translateX(50px) scale(0.97); } }
@keyframes pageExitRight { to { opacity: 0; transform: translateX(50px) scale(0.97); } }
@keyframes pageEnterCenter { from { opacity: 0; transform: scale(0.95); } }
@keyframes pageExitFade { to { opacity: 0; transform: scale(0.98); } }
@keyframes pageEnterFade { from { opacity: 0; transform: scale(0.98); } }
.page-exit-left { animation: pageExitLeft 0.2s ease-in both; }
.page-exit-right { animation: pageExitRight 0.2s ease-in both; }
.page-exit-fade { animation: pageExitFade 0.15s ease-in both; }
.page-enter-right { animation: pageEnterRight 0.3s ease-out both; }
.page-enter-center { animation: pageEnterCenter 0.3s ease-out both; }
.page-enter-fade { animation: pageEnterFade 0.25s ease-out both; }
/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
<div id="root"></div>
<!-- Plain JS (no JSX needed) -->
<script src="js/firebase-config.js"></script>
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<!-- JSX files (need Babel) -->
<script type="text/babel" src="js/login.js"></script>
<script type="text/babel" src="js/components.js"></script>
<script type="text/babel" src="js/app.js"></script>
</body>
</html>
