<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EasyRider Support Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const STATUS_ORDER = ["Open", "In Progress", "Escalated", "Resolved"];
const CATEGORIES = ["Account", "Payment", "App Issue", "Vehicle", "Others"];

const STATUS_STYLES = {
  Open: "bg-slate-100 text-slate-700 border-slate-200",
  "In Progress": "bg-blue-100 text-blue-700 border-blue-200",
  Escalated: "bg-orange-100 text-orange-700 border-orange-200",
  Resolved: "bg-emerald-100 text-emerald-700 border-emerald-200",
};

const IMPORTED_ROWS = [
  ["TKT-1001", "Rider 094", "Khairul", "Incomplete onboarding documents (missing SG Class 2B, log card, insurance)", "Account", "2025-01-09T00:00:00", true, "Ally", "", "Follow-up checklist, partial documents submitted, continued onboarding", "Resolved", "2025-01-09T12:00:00", "Same day"],
  ["TKT-1002", "Rider 094", "Khairul", "Grab account setup issue (login / loading error)", "Account", "2025-01-09T00:00:00", true, "Ally / Dominic", "Grab", "Reinstall app, switch email, resubmit documents", "Resolved", "2025-01-09T16:00:00", "~1 day"],
  ["TKT-1003", "Rider 102", "Samsul", "App error and unable to proceed onboarding", "App Issue", "2025-01-10T00:00:00", true, "Dominic", "Grab", "Resubmission + backend refresh + follow-up", "Resolved", "2025-01-10T18:00:00", "Same day"],
  ["TKT-1004", "Rider 081", "Chan Sikeen", "Appeal for incentive exception after cancellation penalty", "Payment", "2025-01-11T00:00:00", true, "Team", "Grab Finance", "Escalated to Grab for review; outcome aligned with policy", "Resolved", "2025-04-11T00:00:00", "72 days"],
  ["TKT-1005", "Rider 066", "Izzatul", "Bank account issue causing payout risk", "Payment", "2025-01-11T00:00:00", true, "Dominic / Ally", "", "Requested bank account correction and update verification", "Resolved", "2025-01-11T08:00:00", "1 day"],
  ["TKT-1006", "Rider 040", "Fauzan", "Insurance does not cover food delivery", "Vehicle", "2025-01-12T00:00:00", false, "Dominic", "Insurance / Grab", "Pending clarification and policy confirmation", "Escalated", "", ""],
  ["TKT-1007", "Rider 069", "Azrul", "HR admin friction with repeated requests", "Account", "2025-08-24T00:00:00", false, "Admin", "", "Follow-up still ongoing on document handling", "In Progress", "", ""],
  ["TKT-1008", "Rider 048", "Razif", "Did not submit required HR documents", "Account", "2025-08-24T00:00:00", false, "Admin", "", "Awaiting rider submission", "Open", "", ""],
];

function parseDurationLabelToDays(label) {
  if (!label) return null;
  const raw = String(label).trim().toLowerCase();
  if (!raw) return null;
  if (raw === "same day") return 0.5;
  const cleaned = raw.split("").filter((ch) => (ch >= "0" && ch <= "9") || ch === ".").join("");
  if (!cleaned) return null;
  const value = Number(cleaned);
  if (Number.isNaN(value)) return null;
  if (raw.includes("week")) return value * 7;
  if (raw.includes("day")) return value;
  return value;
}

function toDate(value) {
  if (!value) return null;
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? null : date;
}

function formatDateTime(value) {
  const date = toDate(value);
  if (!date) return "\u2014";
  return date.toLocaleString([], { year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}

function getDurationDays(ticket, nowMs) {
  if (ticket.status === "Resolved") {
    if (typeof ticket.importedDurationDays === "number") return ticket.importedDurationDays;
    const start = toDate(ticket.timestampReceived);
    const end = toDate(ticket.timestampSolved);
    if (!start || !end) return 0;
    return Math.max(0, (end.getTime() - start.getTime()) / 86400000);
  }
  const start = toDate(ticket.timestampReceived);
  if (!start) return 0;
  return Math.max(0, (nowMs - start.getTime()) / 86400000);
}

function formatDuration(ticket, nowMs) {
  if (ticket.status === "Resolved" && ticket.importedDurationLabel) return ticket.importedDurationLabel;
  const days = getDurationDays(ticket, nowMs);
  const label = days.toFixed(1) + "d";
  return ticket.status === "Resolved" ? label : "Ongoing \u2022 " + label;
}

function getWarningLevel(ticket, nowMs) {
  if (ticket.status === "Resolved") return "none";
  const days = getDurationDays(ticket, nowMs);
  if (days > 3) return "critical";
  if (days > 2) return "warning";
  return "none";
}

function makeId() {
  return "TKT-" + Math.floor(1000 + Math.random() * 9000);
}

function buildInitialTickets(rows) {
  return rows.map((row) => {
    const [id, riderNo, riderName, issue, category, timestampReceived, acknowledged, responsiblePerson, escalatedTo, solution, status, timestampSolved, importedDurationLabel] = row;
    return { id, riderNo, riderName, issue, category, timestampReceived, acknowledged, acknowledgedAt: acknowledged ? timestampReceived : "", responsiblePerson, escalatedTo, solution, status, timestampSolved, description: issue, comments: [], lastUpdated: timestampSolved || timestampReceived, importedDurationLabel, importedDurationDays: parseDurationLabelToDays(importedDurationLabel) };
  });
}

const INITIAL_TICKETS = buildInitialTickets(IMPORTED_ROWS);

function StatCard({ title, value, hint }) {
  return (
    <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
      <div className="text-sm text-slate-500">{title}</div>
      <div className="mt-2 text-3xl font-semibold text-slate-900">{value}</div>
      <div className="mt-1 text-xs text-slate-500">{hint}</div>
    </div>
  );
}

function Badge({ children, tone }) {
  return <span className={"inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-medium " + tone}>{children}</span>;
}

function TicketDrawer({ ticket, onClose, onChange, onAddComment, staffOptions, currentUser, nowMs }) {
  const [commentText, setCommentText] = useState("");
  useEffect(() => { setCommentText(""); }, [ticket ? ticket.id : ""]);
  if (!ticket) return null;

  return (
    <div className="fixed inset-0 z-40 flex">
      <div className="absolute inset-0 bg-slate-900/40" onClick={onClose} />
      <div className="relative ml-auto flex h-full w-full max-w-2xl flex-col bg-white shadow-2xl">
        <div className="flex items-start justify-between border-b border-slate-200 px-6 py-4">
          <div>
            <div className="text-xs font-medium uppercase tracking-wide text-slate-500">Ticket Details</div>
            <h2 className="mt-1 text-xl font-semibold text-slate-900">{ticket.issue}</h2>
            <div className="mt-2 flex flex-wrap gap-2">
              <Badge tone={STATUS_STYLES[ticket.status]}>{ticket.status}</Badge>
              <Badge tone="bg-slate-100 text-slate-700 border-slate-200">{ticket.id}</Badge>
            </div>
          </div>
          <button type="button" onClick={onClose} className="rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-600 hover:bg-slate-50">Close</button>
        </div>
        <div className="flex-1 overflow-y-auto px-6 py-5 space-y-6">
          <div className="grid grid-cols-1 gap-4 md:grid-cols-2">
            <div className="rounded-2xl border border-slate-200 bg-white p-4">
              <div className="text-xs uppercase tracking-wide text-slate-500">Rider No.</div>
              <div className="mt-1 text-sm font-medium text-slate-900">{ticket.riderNo}</div>
            </div>
            <div className="rounded-2xl border border-slate-200 bg-white p-4">
              <div className="text-xs uppercase tracking-wide text-slate-500">Rider Name</div>
              <div className="mt-1 text-sm font-medium text-slate-900">{ticket.riderName}</div>
            </div>
            <div className="rounded-2xl border border-slate-200 bg-white p-4">
              <div className="text-xs uppercase tracking-wide text-slate-500">Timestamp Issue Received</div>
              <div className="mt-1 text-sm font-medium text-slate-900">{formatDateTime(ticket.timestampReceived)}</div>
            </div>
            <div className={"rounded-2xl border p-4 " + (ticket.status !== "Resolved" && getDurationDays(ticket, nowMs) > 2 ? "border-amber-300 bg-amber-50" : "border-slate-200 bg-white")}>
              <div className="text-xs uppercase tracking-wide text-slate-500">Duration until resolve</div>
              <div className="mt-1 text-sm font-medium text-slate-900">{formatDuration(ticket, nowMs)}</div>
            </div>
          </div>
          <div>
            <h4 className="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Issue Details</h4>
            <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm leading-6 text-slate-700">{ticket.description || "No additional description provided."}</div>
          </div>
          <div>
            <h4 className="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Operations Update</h4>
            <div className="grid grid-cols-1 gap-4 md:grid-cols-2">
              <label className="text-sm">
                <div className="mb-1.5 font-medium text-slate-700">Status</div>
                <select value={ticket.status} onChange={(e) => onChange(ticket.id, { status: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none focus:border-slate-500">
                  {STATUS_ORDER.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </label>
              <label className="text-sm">
                <div className="mb-1.5 font-medium text-slate-700">Responsible Person</div>
                <input list="staff-options" value={ticket.responsiblePerson || ""} onChange={(e) => onChange(ticket.id, { responsiblePerson: e.target.value })} placeholder="Leave blank or type a new name" className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none focus:border-slate-500" />
              </label>
              <label className="text-sm">
                <div className="mb-1.5 font-medium text-slate-700">Escalated to</div>
                <input list="staff-options" value={ticket.escalatedTo || ""} onChange={(e) => onChange(ticket.id, { escalatedTo: e.target.value })} placeholder="Leave blank or type a team or person" className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 outline-none focus:border-slate-500" />
              </label>
              <div className="text-sm">
                <div className="mb-1.5 font-medium text-slate-700">Acknowledged to Rider's Enquiry</div>
                <div className="rounded-2xl border border-slate-300 p-3">
                  <label className="flex items-center gap-3">
                    <input type="checkbox" checked={ticket.acknowledged} onChange={(e) => onChange(ticket.id, { acknowledged: e.target.checked })} className="h-4 w-4 rounded border-slate-300" />
                    <span className="text-slate-700">Mark as acknowledged</span>
                  </label>
                  <div className="mt-2 text-xs text-slate-500">Timestamp: {formatDateTime(ticket.acknowledgedAt)}</div>
                </div>
              </div>
            </div>
          </div>
          <div>
            <h4 className="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Resolution</h4>
            <label className="text-sm">
              <div className="mb-1.5 font-medium text-slate-700">Solution</div>
              <textarea rows={4} value={ticket.solution || ""} onChange={(e) => onChange(ticket.id, { solution: e.target.value })} placeholder="Document what was done, what is pending, or what follow-up is needed" className="w-full rounded-2xl border border-slate-300 bg-white px-3 py-3 outline-none focus:border-slate-500" />
            </label>
          </div>
          <div>
            <h4 className="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Internal Notes / Comments</h4>
            <div className="space-y-3">
              {ticket.comments.length ? ticket.comments.map((comment) => (
                <div key={comment.id} className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                  <div className="flex items-center justify-between gap-3">
                    <div className="text-sm font-medium text-slate-800">{comment.author}</div>
                    <div className="text-xs text-slate-500">{formatDateTime(comment.createdAt)}</div>
                  </div>
                  <div className="mt-2 text-sm text-slate-700">{comment.text}</div>
                </div>
              )) : <div className="rounded-2xl border border-dashed border-slate-300 p-4 text-sm text-slate-500">No comments yet.</div>}
              <div className="rounded-2xl border border-slate-200 p-3">
                <div className="mb-2 text-sm font-medium text-slate-700">Add Comment</div>
                <textarea rows={3} value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Add an internal note for the ops team" className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500" />
                <div className="mt-3 flex justify-end">
                  <button type="button" onClick={() => { if (!commentText.trim()) return; onAddComment(ticket.id, { id: "C-" + Date.now(), author: currentUser || "Ops Staff", text: commentText.trim(), createdAt: new Date().toISOString() }); setCommentText(""); }} className="rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">Save Comment</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <datalist id="staff-options">{staffOptions.map((name) => <option key={name} value={name} />)}</datalist>
      </div>
    </div>
  );
}

function CreateTicketModal({ open, onClose, onCreate, staffOptions }) {
  const [form, setForm] = useState({ riderNo: "", riderName: "", issue: "", category: "Account", description: "", responsiblePerson: "", escalatedTo: "", status: "Open" });
  useEffect(() => { if (!open) setForm({ riderNo: "", riderName: "", issue: "", category: "Account", description: "", responsiblePerson: "", escalatedTo: "", status: "Open" }); }, [open]);
  if (!open) return null;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-slate-900/40" onClick={onClose} />
      <div className="relative w-full max-w-2xl rounded-3xl bg-white p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
        <div className="flex items-start justify-between gap-3">
          <div>
            <div className="text-xs font-medium uppercase tracking-wide text-slate-500">Create Ticket</div>
            <h3 className="mt-1 text-xl font-semibold text-slate-900">New rider support issue</h3>
          </div>
          <button type="button" onClick={onClose} className="rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-600">Close</button>
        </div>
        <div className="mt-5 grid grid-cols-1 gap-4 md:grid-cols-2">
          <label className="text-sm"><div className="mb-1.5 font-medium text-slate-700">Rider No.</div><input value={form.riderNo} onChange={(e) => setForm((s) => ({ ...s, riderNo: e.target.value }))} className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500" /></label>
          <label className="text-sm"><div className="mb-1.5 font-medium text-slate-700">Rider Name</div><input value={form.riderName} onChange={(e) => setForm((s) => ({ ...s, riderName: e.target.value }))} className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500" /></label>
          <label className="text-sm md:col-span-2"><div className="mb-1.5 font-medium text-slate-700">Issue</div><input value={form.issue} onChange={(e) => setForm((s) => ({ ...s, issue: e.target.value }))} className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500" /></label>
          <label className="text-sm"><div className="mb-1.5 font-medium text-slate-700">Issue Category</div><select value={form.category} onChange={(e) => setForm((s) => ({ ...s, category: e.target.value }))} className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500">{CATEGORIES.map((item) => <option key={item} value={item}>{item}</option>)}</select></label>
          <label className="text-sm"><div className="mb-1.5 font-medium text-slate-700">Initial Status</div><select value={form.status} onChange={(e) => setForm((s) => ({ ...s, status: e.target.value }))} className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500">{STATUS_ORDER.map((item) => <option key={item} value={item}>{item}</option>)}</select></label>
          <label className="text-sm"><div className="mb-1.5 font-medium text-slate-700">Responsible Person</div><input list="staff-options-create" value={form.responsiblePerson} onChange={(e) => setForm((s) => ({ ...s, responsiblePerson: e.target.value }))} placeholder="Optional" className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500" /></label>
          <label className="text-sm"><div className="mb-1.5 font-medium text-slate-700">Escalated to</div><input list="staff-options-create" value={form.escalatedTo} onChange={(e) => setForm((s) => ({ ...s, escalatedTo: e.target.value }))} placeholder="Optional" className="w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:border-slate-500" /></label>
          <label className="text-sm md:col-span-2"><div className="mb-1.5 font-medium text-slate-700">Description</div><textarea rows={4} value={form.description} onChange={(e) => setForm((s) => ({ ...s, description: e.target.value }))} placeholder="Capture the rider's issue in enough detail for follow-up" className="w-full rounded-2xl border border-slate-300 px-3 py-3 outline-none focus:border-slate-500" /></label>
        </div>
        <div className="mt-6 flex items-center justify-between gap-4">
          <div className="text-xs text-slate-500">Timestamp auto-filled on creation.</div>
          <button type="button" onClick={() => { if (!form.riderNo.trim() || !form.riderName.trim() || !form.issue.trim()) return; onCreate(form); onClose(); }} className="rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-medium text-white hover:bg-slate-800">Create Ticket</button>
        </div>
        <datalist id="staff-options-create">{staffOptions.map((name) => <option key={name} value={name} />)}</datalist>
      </div>
    </div>
  );
}

function App() {
  const [tickets, setTickets] = useState(INITIAL_TICKETS);
  const [selectedTicketId, setSelectedTicketId] = useState(INITIAL_TICKETS[0] ? INITIAL_TICKETS[0].id : "");
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("All");
  const [quickFilter, setQuickFilter] = useState("all");
  const [sortBy, setSortBy] = useState("timestamp");
  const [createOpen, setCreateOpen] = useState(false);
  const [currentUser, setCurrentUser] = useState("You");
  const [nowMs, setNowMs] = useState(Date.now());

  useEffect(() => { const timer = window.setInterval(() => setNowMs(Date.now()), 60000); return () => window.clearInterval(timer); }, []);

  const staffOptions = useMemo(() => {
    const names = new Set([currentUser, "Ally", "Dominic", "Admin", "Ops Team", "Workshop", "Grab", "Grab Finance", "Finance"]);
    tickets.forEach((t) => { if (t.responsiblePerson) names.add(t.responsiblePerson); if (t.escalatedTo) names.add(t.escalatedTo); t.comments.forEach((c) => { if (c.author) names.add(c.author); }); });
    return Array.from(names).filter(Boolean).sort();
  }, [tickets, currentUser]);

  const summary = useMemo(() => {
    const total = tickets.length;
    const open = tickets.filter((t) => t.status === "Open").length;
    const escalated = tickets.filter((t) => t.status === "Escalated").length;
    const resolved = tickets.filter((t) => t.status === "Resolved").length;
    const resolvedTickets = tickets.filter((t) => t.status === "Resolved");
    const avgResolutionDays = resolvedTickets.length ? resolvedTickets.reduce((sum, t) => sum + getDurationDays(t, nowMs), 0) / resolvedTickets.length : 0;
    return { total, open, escalated, resolved, avgResolutionDays };
  }, [tickets, nowMs]);

  const filteredTickets = useMemo(() => {
    let list = tickets.slice();
    if (search.trim()) { const q = search.toLowerCase(); list = list.filter((t) => [t.id, t.riderNo, t.riderName, t.issue, t.responsiblePerson, t.escalatedTo, t.solution, t.description].filter(Boolean).some((f) => String(f).toLowerCase().includes(q))); }
    if (statusFilter !== "All") list = list.filter((t) => t.status === statusFilter);
    if (quickFilter === "unresolved") list = list.filter((t) => t.status !== "Resolved");
    if (quickFilter === "escalated") list = list.filter((t) => t.status === "Escalated");
    if (quickFilter === "my") list = list.filter((t) => String(t.responsiblePerson || "").toLowerCase().includes(currentUser.toLowerCase()));
    list.sort((a, b) => {
      if (sortBy === "status") return STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status);
      if (sortBy === "duration") return getDurationDays(b, nowMs) - getDurationDays(a, nowMs);
      const aTime = toDate(a.timestampReceived) ? toDate(a.timestampReceived).getTime() : 0;
      const bTime = toDate(b.timestampReceived) ? toDate(b.timestampReceived).getTime() : 0;
      return bTime - aTime;
    });
    return list;
  }, [tickets, search, statusFilter, quickFilter, sortBy, nowMs, currentUser]);

  const selectedTicket = tickets.find((t) => t.id === selectedTicketId) || null;

  function updateTicket(ticketId, changes) {
    setTickets((prev) => prev.map((t) => {
      if (t.id !== ticketId) return t;
      const next = { ...t, ...changes, lastUpdated: new Date().toISOString() };
      if (Object.prototype.hasOwnProperty.call(changes, "acknowledged")) { next.acknowledgedAt = changes.acknowledged ? t.acknowledgedAt || new Date().toISOString() : ""; }
      if (Object.prototype.hasOwnProperty.call(changes, "status")) { next.importedDurationLabel = undefined; next.importedDurationDays = null; if (changes.status === "Resolved") { next.timestampSolved = t.timestampSolved || new Date().toISOString(); } else if (t.status === "Resolved" && changes.status !== "Resolved") { next.timestampSolved = ""; } }
      return next;
    }));
  }

  function addComment(ticketId, comment) {
    setTickets((prev) => prev.map((t) => t.id === ticketId ? { ...t, comments: t.comments.concat(comment), lastUpdated: new Date().toISOString() } : t));
  }

  function createTicket(form) {
    const now = new Date().toISOString();
    const newTicket = { id: makeId(), riderNo: form.riderNo, riderName: form.riderName, issue: form.issue, category: form.category, timestampReceived: now, acknowledged: false, acknowledgedAt: "", responsiblePerson: form.responsiblePerson, escalatedTo: form.escalatedTo, solution: "", status: form.status, timestampSolved: form.status === "Resolved" ? now : "", description: form.description, comments: [], lastUpdated: now, importedDurationLabel: undefined, importedDurationDays: null };
    setTickets((prev) => [newTicket].concat(prev));
    setSelectedTicketId(newTicket.id);
  }

  return (
    <div className="min-h-screen bg-slate-100 text-slate-900">
      <div className="flex min-h-screen">
        <aside className="hidden w-64 shrink-0 border-r border-slate-200 bg-white p-5 lg:block">
          <div className="rounded-2xl bg-slate-900 p-4 text-white">
            <div className="text-xs uppercase tracking-[0.2em] text-slate-300">EasyRider</div>
            <div className="mt-2 text-xl font-semibold">Rider Support Tracker</div>
            <div className="mt-1 text-sm text-slate-300">Internal ops dashboard</div>
          </div>
          <div className="mt-6 space-y-2">
            <button type="button" className="w-full rounded-xl bg-slate-900 px-3 py-2 text-left text-sm text-white">Support Tickets</button>
            <button type="button" className="w-full rounded-xl px-3 py-2 text-left text-sm text-slate-600 hover:bg-slate-100">Analytics</button>
            <button type="button" className="w-full rounded-xl px-3 py-2 text-left text-sm text-slate-600 hover:bg-slate-100">Escalations</button>
            <button type="button" className="w-full rounded-xl px-3 py-2 text-left text-sm text-slate-600 hover:bg-slate-100">Team Queue</button>
          </div>
          <div className="mt-8 rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <div className="text-xs uppercase tracking-wide text-slate-500">Current staff filter</div>
            <input value={currentUser} onChange={(e) => setCurrentUser(e.target.value)} placeholder="Type your name" className="mt-2 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none focus:border-slate-500" />
            <div className="mt-2 text-xs text-slate-500">Used for the My tickets quick filter.</div>
          </div>
        </aside>

        <main className="flex-1 p-4 md:p-6">
          <div className="mx-auto max-w-[1600px]">
            <div className="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
              <div>
                <div className="text-sm font-medium text-slate-500">Operations / Rider Support</div>
                <h1 className="mt-1 text-2xl font-semibold tracking-tight text-slate-900">Ticket dashboard</h1>
                <p className="mt-1 text-sm text-slate-500">Track rider issues, ownership, escalation, acknowledgement, and resolution timing.</p>
              </div>
              <div className="flex flex-wrap gap-3">
                <button type="button" onClick={() => setQuickFilter("unresolved")} className="rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Unresolved only</button>
                <button type="button" onClick={() => setCreateOpen(true)} className="rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-medium text-white hover:bg-slate-800">Create Ticket</button>
              </div>
            </div>

            <div className="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-5">
              <StatCard title="Total Tickets" value={summary.total} hint="All tickets in tracker" />
              <StatCard title="Open" value={summary.open} hint="Awaiting action" />
              <StatCard title="Escalated" value={summary.escalated} hint="Needs escalation" />
              <StatCard title="Resolved" value={summary.resolved} hint="Closed with solution recorded" />
              <StatCard title="Avg Resolution" value={summary.avgResolutionDays.toFixed(1) + "d"} hint="Based on resolved tickets" />
            </div>

            <div className="mt-6 rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div className="grid flex-1 grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
                  <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search by rider, ticket ID, issue, assignee..." className="rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-slate-500 xl:col-span-2" />
                  <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-slate-500">
                    <option value="All">All Statuses</option>
                    {STATUS_ORDER.map((s) => <option key={s} value={s}>{s}</option>)}
                  </select>
                  <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-slate-500">
                    <option value="timestamp">Sort by Timestamp</option>
                    <option value="status">Sort by Status</option>
                    <option value="duration">Sort by Duration</option>
                  </select>
                </div>
                <div className="flex flex-wrap gap-2">
                  {[{ key: "all", label: "All" }, { key: "unresolved", label: "Unresolved" }, { key: "escalated", label: "Escalated" }, { key: "my", label: "My tickets" }].map((item) => (
                    <button key={item.key} type="button" onClick={() => setQuickFilter(item.key)} className={"rounded-xl px-3 py-2 text-sm font-medium " + (quickFilter === item.key ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200")}>{item.label}</button>
                  ))}
                </div>
              </div>

              <div className="mt-4 overflow-hidden rounded-2xl border border-slate-200">
                <div className="overflow-x-auto">
                  <table className="min-w-[1400px] w-full text-sm">
                    <thead className="bg-slate-50 text-left text-slate-600">
                      <tr>
                        {["Rider No.", "Rider Name", "Issue", "Timestamp Issue Received", "Acknowledged", "Responsible Person", "Escalated to", "Solution", "Status", "Timestamp Issue Solved", "Duration until resolve"].map((col) => <th key={col} className="whitespace-nowrap border-b border-slate-200 px-4 py-3 font-medium">{col}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {filteredTickets.length ? filteredTickets.map((ticket) => {
                        const warningLevel = getWarningLevel(ticket, nowMs);
                        const rowTone = warningLevel === "critical" ? "bg-rose-50/80" : warningLevel === "warning" ? "bg-amber-50/70" : selectedTicketId === ticket.id ? "bg-slate-50" : "bg-white";
                        return (
                          <tr key={ticket.id} onClick={() => setSelectedTicketId(ticket.id)} className={"cursor-pointer border-b border-slate-200 transition hover:bg-slate-50 " + rowTone}>
                            <td className="whitespace-nowrap px-4 py-3 font-medium text-slate-900">{ticket.riderNo}</td>
                            <td className="whitespace-nowrap px-4 py-3">{ticket.riderName}</td>
                            <td className="max-w-[280px] px-4 py-3"><div className="font-medium text-slate-900">{ticket.issue}</div><div className="mt-1 text-xs text-slate-500">{ticket.id + " \u2022 " + ticket.category}</div></td>
                            <td className="whitespace-nowrap px-4 py-3">{formatDateTime(ticket.timestampReceived)}</td>
                            <td className="px-4 py-3"><div className="font-medium text-slate-900">{ticket.acknowledged ? "Yes" : "No"}</div><div className="mt-1 whitespace-nowrap text-xs text-slate-500">{formatDateTime(ticket.acknowledgedAt)}</div></td>
                            <td className="whitespace-nowrap px-4 py-3">{ticket.responsiblePerson || "\u2014"}</td>
                            <td className="whitespace-nowrap px-4 py-3">{ticket.escalatedTo || "\u2014"}</td>
                            <td className="max-w-[280px] px-4 py-3 text-slate-600">{ticket.solution || "\u2014"}</td>
                            <td className="whitespace-nowrap px-4 py-3"><Badge tone={STATUS_STYLES[ticket.status]}>{ticket.status}</Badge></td>
                            <td className="whitespace-nowrap px-4 py-3">{formatDateTime(ticket.timestampSolved)}</td>
                            <td className="whitespace-nowrap px-4 py-3">{formatDuration(ticket, nowMs)}</td>
                          </tr>
                        );
                      }) : <tr><td colSpan={11} className="px-4 py-12 text-center text-sm text-slate-500">No tickets match the current filters.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

      <TicketDrawer ticket={selectedTicket} onClose={() => setSelectedTicketId("")} onChange={updateTicket} onAddComment={addComment} staffOptions={staffOptions} currentUser={currentUser} nowMs={nowMs} />
      <CreateTicketModal open={createOpen} onClose={() => setCreateOpen(false)} onCreate={createTicket} staffOptions={staffOptions} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
